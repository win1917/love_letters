<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Love Project ❤️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #ffeef2; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Quicksand', sans-serif; overflow: hidden; user-select: none; }

        /* --- 1. MÀN HÌNH KHÓA PIN --- */
        #lockscreen { position: fixed; inset: 0; background: #ffeef2; display: flex; justify-content: center; align-items: center; z-index: 999; transition: opacity 0.5s ease; }
        .lock-box { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); padding: 30px; border-radius: 24px; display: flex; gap: 30px; box-shadow: 0 10px 30px rgba(240, 128, 128, 0.2); border: 2px solid #fff; align-items: center; }
        .avatar-side img { width: 200px; height: 260px; object-fit: cover; border-radius: 16px; border: 3px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .pin-side { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 220px; }
        .heart-icon { color: #ff4757; font-size: 32px; margin-bottom: 10px; animation: beat 1s infinite alternate; }
        @keyframes beat { to { transform: scale(1.15); } }
        .dots { display: flex; gap: 15px; margin-bottom: 25px; }
        .dot { width: 12px; height: 12px; border: 2px solid #ff4757; border-radius: 50%; transition: 0.2s; }
        .dot.active { background: #ff4757; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .key { width: 50px; height: 50px; background: rgba(255, 255, 255, 0.9); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #ff4757; cursor: pointer; transition: 0.2s; box-shadow: 0 3px 10px rgba(0,0,0,0.05); }
        .key:active { background: #ff4757; color: #fff; }
        #hint-btn { margin-top: 15px; font-size: 13px; color: #ff4757; cursor: pointer; text-decoration: underline; }

        /* --- 2. MENU CHÍNH (DASHBOARD) --- */
        #dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; width: 560px; opacity: 0; transform: scale(0.9); transition: 0.5s ease; display: none; }
        .menu-card { background: white; padding: 35px 25px; border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; cursor: pointer; box-shadow: 0 8px 20px rgba(240, 128, 128, 0.1); border: 2px solid transparent; transition: 0.3s; }
        .menu-card:hover { transform: translateY(-5px); border-color: #ffb6c1; background: #fff0f3; }
        .menu-card i, .menu-card img { font-size: 45px; color: #ff4757; width: 50px; height: 50px; object-fit: contain; }
        .menu-card span { font-weight: bold; color: #444; font-size: 16px; }

        /* --- 3. GIAO DIỆN CHUNG CỦA POPUP MODAL --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.15); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: rgba(255, 255, 255, 0.95); width: 620px; border-radius: 32px; padding: 30px; position: relative; box-shadow: 0 20px 45px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.6); }
        .close-modal { position: absolute; top: 20px; right: 25px; width: 26px; height: 26px; background: #ff4757; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 14px; cursor: pointer; z-index: 10; transition: 0.2s; }
        .close-modal:hover { transform: scale(1.15); }

        /* --- 4. CHI TIẾT MUSIC PLAYER --- */
        .music-layout { display: flex; gap: 25px; align-items: center; }
        .player-left { width: 45%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .disc { width: 170px; height: 170px; border-radius: 50%; border: 5px solid #fff; box-shadow: 0 8px 25px rgba(0,0,0,0.1); background-size: cover; background-position: center; animation: spin 12s linear infinite; animation-play-state: paused; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .song-title { font-weight: bold; margin-top: 18px; color: #ff4757; text-align: center; font-size: 15px; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .controls { display: flex; gap: 22px; margin-top: 15px; align-items: center; justify-content: center; }
        .controls i { color: #ff4757; cursor: pointer; font-size: 20px; }
        .btn-play { width: 50px; height: 50px; background: #ff4757; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 18px; box-shadow: 0 4px 10px rgba(255, 71, 87, 0.3); }
        .player-right { width: 55%; border-left: 1px solid #f0f0f0; padding-left: 20px; display: flex; flex-direction: column; gap: 10px; max-height: 280px; overflow-y: auto; }
        .song-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 16px; cursor: pointer; transition: 0.2s; background: rgba(255,255,255,0.5); }
        .song-item.active { background: #ffe3e7; }
        .song-item img { width: 44px; height: 44px; border-radius: 12px; object-fit: cover; }
        .song-item span { font-size: 14px; font-weight: 600; color: #444; }

        /* --- 5. BỨC THƯ --- */
        .letter-container { display: flex; justify-content: center; align-items: center; height: 320px; }
        .envelope-wrapper { position: relative; width: 300px; height: 190px; background-color: #f08080; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; cursor: pointer; box-shadow: 0 12px 28px rgba(0,0,0,0.1); z-index: 1; }
        .flap { position: absolute; top: 0; left: 0; border-left: 150px solid transparent; border-right: 150px solid transparent; border-top: 105px solid #cd5c5c; transform-origin: top; transition: transform 0.5s ease-in-out, z-index 0.5s; z-index: 4; }
        .envelope-wrapper.open .flap { transform: rotateX(180deg); z-index: 1; }
        .pocket { position: absolute; bottom: 0; left: 0; border-left: 150px solid #e9967a; border-right: 150px solid #e9967a; border-bottom: 95px solid #e9967a; border-top: 95px solid transparent; border-radius: 12px; z-index: 3; pointer-events: none; }
        .letter { position: absolute; bottom: 5px; left: 10px; width: 280px; height: 170px; background-color: #fff; padding: 18px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); z-index: 2; transition: transform 0.6s ease-in-out 0.3s, height 0.6s ease-in-out 0.3s; overflow: hidden; font-family: 'Dancing Script', cursive; font-size: 20px; }
        .envelope-wrapper.open .letter { transform: translateY(-120px); height: 270px; z-index: 5; }
        .heart-seal { position: absolute; top: 85px; left: 135px; width: 30px; height: 30px; background-color: #d63031; transform: rotate(-45deg); z-index: 5; border-radius: 2px; }
        .heart-seal::before, .heart-seal::after { content: ""; position: absolute; width: 30px; height: 30px; background-color: #d63031; border-radius: 50%; }
        .heart-seal::before { top: -15px; left: 0; }
        .heart-seal::after { left: 15px; top: 0; }
        .envelope-wrapper.open .heart-seal { transform: scale(0); opacity: 0; }
        #text-container { font-weight: bold; white-space: pre-line; color: #444; line-height: 1.4; }

        /* --- 6. CHI TIẾT ALBUM ẢNH --- */
        .grid-album { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-height: 380px; overflow-y: auto; }
        .grid-album img { width: 100%; height: 115px; object-fit: cover; border-radius: 14px; cursor: pointer; border: 2px solid #fff; }
        #slider-modal { z-index: 200; background: rgba(0,0,0,0.85); }
        .slider-wrapper { position: relative; display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
        .slider-img { max-width: 85%; max-height: 80vh; border-radius: 16px; border: 4px solid #fff; }
        .slider-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .arrow-left { left: 30px; } .arrow-right { right: 30px; }

        /* --- 7. TÍNH NĂNG GIFT: BÁNH KEM 3D CÓ NẾN LỬA RÕ RÀNG --- */
        #gift-modal .modal-content { width: 90vw; height: 85vh; max-width: 900px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; background: #fff5f7; border: 3px solid #ffccd5; position: relative; perspective: 1200px; }
        .gift-playground { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; cursor: crosshair; transform-style: preserve-3d; }
        
        /* Container gốc bánh 3D */
        .cake-3d-container { position: absolute; transform-style: preserve-3d; transition: transform 0.1s linear; width: 300px; height: 400px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: grab; transform: rotateX(-15deg) rotateY(0deg) scale(1); }
        .cake-3d-container:active { cursor: grabbing; }

        /* Các khối tầng bánh */
        .cake-3d-layer { position: absolute; transform-style: preserve-3d; left: 50%; top: 50%; }
        .layer-3d-top { width: 130px; height: 70px; margin-left: -65px; margin-top: -90px; }
        .layer-3d-middle { width: 190px; height: 80px; margin-left: -95px; margin-top: -20px; }
        .layer-3d-bottom { width: 250px; height: 90px; margin-left: -125px; margin-top: 60px; }

        /* Vách dọc bao quanh */
        .cake-side-panel { position: absolute; background-size: cover; background-position: center; border: 1px solid rgba(255,255,255,0.25); box-shadow: inset 0 0 15px rgba(0,0,0,0.1); backface-visibility: visible; }
        
        /* Mặt trên của tầng bánh */
        .cake-top-cap { position: absolute; background: #fff0f3; border: 2px solid #fff; border-radius: 50%; transform: rotateX(90deg); box-shadow: inset 0 0 20px rgba(255, 182, 193, 0.6); }

        /* CÂY NẾN ĐỨNG TRÊN ĐỈNH BÁNH */
        .candle-3d { width: 10px; height: 45px; background: linear-gradient(to right, #ff4d6d, #ff758f, #ff4d6d); position: absolute; left: 50%; margin-left: -5px; top: -155px; transform: translateZ(0px); border-radius: 4px; z-index: 999; transform-style: preserve-3d; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .candle-3d::before { content: ''; position: absolute; top: -6px; left: 4px; width: 2px; height: 6px; background: #444; }
        
        /* Ngọn lửa lung linh */
        .flame-3d { width: 14px; height: 24px; background: radial-gradient(circle at bottom, #ffea00 20%, #ff9421 60%, #ff3c00 100%); border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%; position: absolute; top: -28px; left: -2px; animation: flicker 0.15s infinite alternate; box-shadow: 0 0 15px #ff9421, 0 0 25px #ff3c00; transform-origin: bottom center; }
        @keyframes flicker { 0% { transform: scale(1) rotate(-3deg); } 100% { transform: scale(1.15) rotate(3deg); } }

        /* Hệ thống bong bóng bay */
        .bubble { position: absolute; width: 80px; height: 80px; background: rgba(255, 192, 203, 0.55); border-radius: 50%; box-shadow: inset -6px -6px 12px rgba(0,0,0,0.06), 0 4px 10px rgba(0,0,0,0.05); animation: floatBubble 5s linear forwards; cursor: pointer; display: flex; justify-content: center; align-items: center; border: 2px solid #fff; z-index: 10; }
        .bubble img { width: 85%; height: 85%; object-fit: cover; border-radius: 50%; pointer-events: none; }
        @keyframes floatBubble {
            0% { transform: translateY(110%) scale(0.8); opacity: 1; }
            100% { transform: translateY(-110vh) scale(1.1); opacity: 0; }
        }

        /* Lời chúc bung ra khi nổ bong bóng */
        .pop-message { position: absolute; background: white; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; box-shadow: 0 4px 15px rgba(255,71,87,0.2); animation: fadeOutMsg 2s ease-out forwards; display: flex; align-items: center; gap: 6px; pointer-events: none; border: 1px solid #ffccd5; color: #ff4757; z-index: 20; }
        @keyframes fadeOutMsg { 0% { transform: scale(0.7) translateY(0); opacity: 1; } 100% { transform: scale(1.1) translateY(-60px); opacity: 0; } }

        .gift-hint { position: absolute; bottom: 15px; width: 100%; text-align: center; font-size: 13px; color: #ff4757; font-weight: bold; pointer-events: none; z-index: 30; }

        /* Hiệu ứng tim lơ lửng */
        .floating-heart { position: fixed; color: #ff4757; pointer-events: none; animation: floatUp 3s linear forwards; z-index: 250; font-size: 20px; }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.3) translateX(calc(var(--x) * 1px)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="lockscreen">
        <div class="lock-box">
            <div class="avatar-side"><img src="https://picsum.photos/200/260?random=10" alt="Avatar"></div>
            <div class="pin-side">
                <div class="heart-icon"><i class="fas fa-heart"></i></div>
                <div class="dots">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
                <div class="keypad">
                    <div class="key" onclick="pressKey('1')">1</div><div class="key" onclick="pressKey('2')">2</div><div class="key" onclick="pressKey('3')">3</div>
                    <div class="key" onclick="pressKey('4')">4</div><div class="key" onclick="pressKey('5')">5</div><div class="key" onclick="pressKey('6')">6</div>
                    <div class="key" onclick="pressKey('7')">7</div><div class="key" onclick="pressKey('8')">8</div><div class="key" onclick="pressKey('9')">9</div>
                    <div class="key" style="visibility:hidden;"></div><div class="key" onclick="pressKey('0')">0</div><div class="key" onclick="deleteKey()"><i class="fas fa-backspace"></i></div>
                </div>
                <div id="hint-btn" onclick="alert('Mật mã mở khóa là: 2902 nha!')">Xem gợi ý mật khẩu</div>
            </div>
        </div>
    </div>

    <div id="dashboard">
        <div class="menu-card" onclick="openModal('music-modal')">
            <i class="fas fa-headphones-alt"></i><span>Music</span>
        </div>
        <div class="menu-card" onclick="openModal('letter-modal')">
            <i class="fas fa-envelope-open-text"></i><span>Letter</span>
        </div>
        <div class="menu-card" onclick="openModal('image-modal')">
            <i class="fas fa-images"></i><span>Image</span>
        </div>
        <div class="menu-card" onclick="openModal('gift-modal')">
            <img src="https://cdn-icons-png.flaticon.com/512/3159/3159313.png" alt="Gift"><span>Gift</span>
        </div>
    </div>

    <div id="music-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('music-modal')">&times;</span>
            <div class="music-layout">
                <div class="player-left">
                    <div class="disc" id="main-disc"></div>
                    <div class="song-title" id="main-title">Đang tải...</div>
                    <div class="controls">
                        <i class="fas fa-step-backward" onclick="prevSong()"></i>
                        <div class="btn-play" onclick="togglePlay()">
                            <i class="fas fa-play" id="main-play-icon"></i>
                        </div>
                        <i class="fas fa-step-forward" onclick="nextSong()"></i>
                    </div>
                </div>
                <div class="player-right" id="playlist-container"></div>
            </div>
        </div>
    </div>

    <div id="letter-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('letter-modal')">&times;</span>
            <div class="letter-container">
                <div id="envelope" class="envelope-wrapper" onclick="openLetter()">
                    <div class="flap"></div>
                    <div class="pocket"></div>
                    <div class="heart-seal"></div>
                    <div class="letter">
                        <div id="text-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="image-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('image-modal')">&times;</span>
            <h3 style="color:#ff4757; margin-bottom:18px; text-align:center;"><i class="fas fa-heart"></i> Kho Bảnh Khảnh Kỷ Niệm</h3>
            <div class="grid-album" id="grid-album"></div>
        </div>
    </div>

    <div id="slider-modal" class="modal">
        <span class="close-modal" style="color:white;" onclick="closeModal('slider-modal')">&times;</span>
        <div class="slider-wrapper">
            <button class="slider-arrow arrow-left" onclick="changeSlider(-1)"><i class="fas fa-chevron-left"></i></button>
            <img class="slider-img" id="slider-img" src="" alt="Zoomed">
            <button class="slider-arrow arrow-right" onclick="changeSlider(1)"><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <div id="gift-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('gift-modal')">&times;</span>
            <div class="gift-playground" id="gift-playground" onmousedown="startCakeRotate(event)" onwheel="zoomCake(event)">
                
                <div class="cake-3d-container" id="cake-3d-object">
                    <div class="candle-3d"><div class="flame-3d"></div></div>
                    
                    <div class="cake-3d-layer layer-3d-top" id="layer-top"></div>
                    <div class="cake-3d-layer layer-3d-middle" id="layer-middle"></div>
                    <div class="cake-3d-layer layer-3d-bottom" id="layer-bottom"></div>
                </div>

                <div class="gift-hint">Cuộn chuột để Phóng to/Thu nhỏ • Giữ chuột kéo để Xoay bánh • Nhấp nền để thả Bong bóng</div>
            </div>
        </div>
    </div>

    <audio id="audio-player" loop></audio>

    <script>
        // --- DATA NGUỒN ---
        const songList = [
            { title: "Lỡ Say Bye Là Bye", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", cover: "https://picsum.photos/150/150?random=1" },
            { title: "In Love x Có Đâu Ai Ngờ", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", cover: "https://picsum.photos/150/150?random=2" },
            { title: "Ai Ngoài Anh - Tình Ca", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", cover: "https://picsum.photos/150/150?random=3" },
            { title: "Missing You - Phương Ly", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3", cover: "https://picsum.photos/150/150?random=4" }
        ];

        const imageList = [
            "https://picsum.photos/300/400?random=31", "https://picsum.photos/300/400?random=32",
            "https://picsum.photos/300/400?random=33", "https://picsum.photos/300/400?random=34",
            "https://picsum.photos/300/400?random=35", "https://picsum.photos/300/400?random=36",
            "https://picsum.photos/300/400?random=37", "https://picsum.photos/300/400?random=38"
        ];

        let currentSongIndex = 0;
        let currentImgIndex = 0;
        const audio = document.getElementById('audio-player');

        // --- MÀN HÌNH KHÓA PIN & SỰ KIỆN PHÍM BẤM ---
        let currentPin = "";
        function pressKey(num) {
            if (currentPin.length < 4) {
                currentPin += num;
                updateDots();
                if (currentPin.length === 4) setTimeout(checkPin, 200);
            }
        }
        function deleteKey() { if (currentPin.length > 0) { currentPin = currentPin.slice(0, -1); updateDots(); } }
        function updateDots() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((d, i) => d.classList.toggle('active', i < currentPin.length));
        }
        function checkPin() {
            if (currentPin === "2902") {
                document.getElementById('lockscreen').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('lockscreen').style.display = "none";
                    document.getElementById('dashboard').style.display = "grid";
                    setTimeout(() => { 
                        document.getElementById('dashboard').style.opacity = "1"; 
                        document.getElementById('dashboard').style.transform = "scale(1)"; 
                    }, 50);
                    initMusicAndAlbum();
                    buildCylinderCake(); 
                    setInterval(createHeart, 500);
                }, 500);
            } else {
                alert("Mã PIN không đúng rồi nè!"); currentPin = ""; updateDots();
            }
        }

        // Bổ sung lắng nghe phím bấm từ bàn phím vật lý
        document.addEventListener('keyup', function(e) {
            // Chỉ chạy khi màn hình khóa đang hiển thị
            if (document.getElementById('lockscreen').style.display !== "none") {
                if (e.key >= '0' && e.key <= '9') {
                    pressKey(e.key);
                } else if (e.key === 'Backspace') {
                    deleteKey();
                }
            }
        });

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // --- KHỞI TẠO INTERFACE ---
        function initMusicAndAlbum() {
            loadSong(currentSongIndex);
            document.getElementById('playlist-container').innerHTML = songList.map((song, index) => `
                <div class="song-item ${index === currentSongIndex ? 'active' : ''}" id="song-${index}" onclick="selectSong(${index})">
                    <img src="${song.cover}">
                    <span>${song.title}</span>
                </div>
            `).join('');

            document.getElementById('grid-album').innerHTML = imageList.map((img, index) => `
                <img src="${img}" onclick="openSlider(${index})">
            `).join('');
        }

        function loadSong(index) {
            currentSongIndex = index;
            audio.src = songList[index].src;
            document.getElementById('main-title').textContent = songList[index].title;
            document.getElementById('main-disc').style.backgroundImage = `url('${songList[index].cover}')`;
            document.querySelectorAll('.song-item').forEach((item, idx) => item.classList.toggle('active', idx === index));
        }

        function selectSong(index) { loadSong(index); audio.play().then(() => setPlayState(true)); }
        function togglePlay() { if (audio.paused) { audio.play(); setPlayState(true); } else { audio.pause(); setPlayState(false); } }
        function setPlayState(isPlaying) {
            const icon = document.getElementById('main-play-icon');
            const disc = document.getElementById('main-disc');
            icon.className = isPlaying ? "fas fa-pause" : "fas fa-play";
            disc.style.animationPlayState = isPlaying ? "running" : "paused";
        }

        function nextSong() { selectSong((currentSongIndex + 1) % songList.length); }
        function prevSong() { selectSong((currentSongIndex - 1 + songList.length) % songList.length); }

        // --- TIẾN TRÌNH BỨC THƯ ---
        let charIndex = 0;
        let letterText = "Gửi người con gái anh yêu.\n\nHôm nay là một ngày thật đặc biệt, bởi đó là ngày em đến với thế giới này. Chúc em luôn hạnh phúc và cười thật nhiều nhé! ❤️";
        function openLetter() {
            if (!document.getElementById('envelope').classList.contains('open')) {
                document.getElementById('envelope').classList.add('open');
                setTimeout(typewriter, 1000);
            }
        }
        function typewriter() {
            if (charIndex < letterText.length) {
                document.getElementById("text-container").textContent += letterText.charAt(charIndex);
                charIndex++; setTimeout(typewriter, 60);
            }
        }

        // --- KHUNG SLIDER ẢNH ---
        function openSlider(index) { currentImgIndex = index; document.getElementById('slider-img').src = imageList[index]; openModal('slider-modal'); }
        function changeSlider(dir) { currentImgIndex = (currentImgIndex + dir + imageList.length) % imageList.length; document.getElementById('slider-img').src = imageList[currentImgIndex]; }

        // --- DỰNG KHỐI TRỤ BÁNH KEM 3D ---
        function generateSegments(layerId, width, height, radius, bgImg) {
            const container = document.getElementById(layerId);
            const segments = 16; 
            const sideWidth = Math.tan(Math.PI / segments) * radius * 2;

            const topCap = document.createElement('div');
            topCap.className = "cake-top-cap";
            topCap.style.width = `${radius * 2}px`;
            topCap.style.height = `${radius * 2}px`;
            topCap.style.left = `calc(50% - ${radius}px)`;
            topCap.style.top = `calc(50% - ${radius}px)`;
            topCap.style.transform = `translateY(${-height/2}px) rotateX(90deg)`;
            container.appendChild(topCap);

            for (let i = 0; i < segments; i++) {
                const angle = (360 / segments) * i;
                const panel = document.createElement('div');
                panel.className = "cake-side-panel";
                panel.style.width = `${sideWidth + 1}px`; 
                panel.style.height = `${height}px`;
                panel.style.left = `calc(50% - ${sideWidth / 2}px)`;
                panel.style.top = `calc(50% - ${height / 2}px)`;
                panel.style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`;
                panel.style.backgroundImage = `url('${bgImg}')`;
                container.appendChild(panel);
            }
        }

        function buildCylinderCake() {
            generateSegments('layer-top', 130, 70, 65, imageList[0]);
            generateSegments('layer-middle', 190, 80, 95, imageList[1]);
            generateSegments('layer-bottom', 250, 90, 125, imageList[2]);
        }

        // --- XOAY & ZOOM BÁNH ---
        let cakeScale = 1;
        let cakeRotateX = -15;
        let cakeRotateY = 0;
        let isDragging = false;
        let startX, startY;

        function zoomCake(e) {
            e.preventDefault();
            cakeScale += e.deltaY * -0.001;
            cakeScale = Math.min(Math.max(0.4, cakeScale), 1.6);
            updateCakeTransform();
        }

        function startCakeRotate(e) {
            if (e.target.closest('.bubble')) return;
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            document.addEventListener('mousemove', onCakeRotate);
            document.addEventListener('mouseup', stopCakeRotate);
        }

        function onCakeRotate(e) {
            if (!isDragging) return;
            let deltaX = e.clientX - startX;
            let deltaY = e.clientY - startY;
            
            cakeRotateY += deltaX * 0.5;
            cakeRotateX -= deltaY * 0.5;
            cakeRotateX = Math.min(Math.max(-45, cakeRotateX), 20); 
            
            startX = e.clientX;
            startY = e.clientY;
            updateCakeTransform();
        }

        function stopCakeRotate() { isDragging = false; document.removeEventListener('mousemove', onCakeRotate); }
        function updateCakeTransform() {
            document.getElementById('cake-3d-object').style.transform = `rotateX(${cakeRotateX}deg) rotateY(${cakeRotateY}deg) scale(${cakeScale})`;
        }

        // --- THẢ BONG BÓNG ---
        document.getElementById('gift-playground').addEventListener('click', function(e) {
            if (e.target.closest('.cake-3d-container') || e.target.closest('.bubble')) return;
            
            const playground = this;
            const rect = playground.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.style.left = `${x - 40}px`;
            bubble.style.top = `${y - 40}px`;
            
            const randomImg = imageList[Math.floor(Math.random() * imageList.length)];
            bubble.innerHTML = `<img src="${randomImg}">`;
            
            bubble.addEventListener('click', function(el) {
                el.stopPropagation();
                const textPool = ["I love you ❤️", "Anh yêu em! 🌹", "Bông hoa tặng em 🌸"];
                const chosenText = textPool[Math.floor(Math.random() * textPool.length)];
                
                const msg = document.createElement('div');
                msg.className = 'pop-message';
                msg.style.left = bubble.style.left;
                msg.style.top = bubble.style.top;
                msg.innerHTML = `<i class="fas fa-heart"></i> ${chosenText}`;
                
                playground.appendChild(msg);
                bubble.remove();
                setTimeout(() => msg.remove(), 2000);
            });

            playground.appendChild(bubble);
            setTimeout(() => { if (bubble.parentNode) bubble.remove(); }, 5000);
        });

        function createHeart() {
            const heart = document.createElement('i');
            heart.className = "fas fa-heart floating-heart";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.setProperty('--x', (Math.random() * 200 - 100));
            heart.style.animationDuration = (Math.random() * 2 + 2) + "s";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 3000);
        }
    </script>
</body>
</html>
